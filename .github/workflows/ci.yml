name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.9.26"
          enable-cache: true
      - run: uv sync --frozen --all-extras --dev
      - run: uv run ruff check src tests scripts
      - run: uv run ruff format --check src tests scripts
      - run: uv run mypy src scripts
      - run: uv run pytest -m 'not integration' --cov=seecad --cov-report=xml

  web:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm --dir web install --frozen-lockfile
      - run: pnpm --dir web format:check
      - run: pnpm --dir web lint
      - run: pnpm --dir web typecheck
      - run: pnpm --dir web test --run
      - run: pnpm --dir web build

  engine:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.9.26"
      - run: docker build -f docker/openscad.Dockerfile -t seecad-openscad:local .
      - run: uv sync --frozen --all-extras --dev
      - run: SEECAD_OPENSCAD_IMAGE=seecad-openscad:local uv run pytest -m integration

  compose:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config --quiet
      - run: docker compose up --detach --build
      - run: python3 scripts/compose_smoke.py
      - if: failure()
        run: docker compose logs --no-color
      - if: always()
        run: docker compose down --volumes
